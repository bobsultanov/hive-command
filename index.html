<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hive Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange: #F4A261; --orange-dark: #E08C4A;
    --bg: #0F0F0E; --bg-surface: #1A1A18; --bg-raised: #222220;
    --border: rgba(255,255,255,0.08); --border-hover: rgba(244,162,97,0.4);
    --text-primary: #F0EDE8; --text-secondary: #8A8880; --text-muted: #555450;
    --font-display: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
    --sidebar-w: 200px; --header-h: 60px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text-primary); font-family: var(--font-display); -webkit-font-smoothing: antialiased; overflow: hidden; }

  .topbar { position: fixed; top: 0; left: 0; right: 0; height: var(--header-h); background: var(--bg); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark { width: 30px; height: 30px; background: var(--orange); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-mark svg { width: 17px; height: 17px; }
  .logo-name { font-size: 16px; font-weight: 700; letter-spacing: -0.4px; }
  .logo-name span { color: var(--orange); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }

  .status-pill { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-secondary); background: var(--bg-surface); border: 0.5px solid var(--border); border-radius: 20px; padding: 4px 10px; font-family: var(--font-mono); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); transition: background 0.3s; flex-shrink: 0; }
  .dot.connected { background: #4ade80; box-shadow: 0 0 5px rgba(74,222,128,0.5); }
  .dot.error { background: #f87171; }
  .dot.remembered { background: #60a5fa; box-shadow: 0 0 5px rgba(96,165,250,0.5); }

  .key-toggle { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); background: var(--bg-surface); border: 0.5px solid var(--border); border-radius: 20px; padding: 4px 10px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: border-color 0.15s, color 0.15s; }
  .key-toggle:hover { border-color: var(--border-hover); color: var(--text-primary); }
  .key-toggle-arrow { font-size: 9px; transition: transform 0.2s; display: inline-block; }
  .key-toggle-arrow.open { transform: rotate(180deg); }

  .key-drawer { position: fixed; top: var(--header-h); left: 0; right: 0; background: var(--bg-surface); border-bottom: 0.5px solid var(--border); padding: 14px 20px; z-index: 99; transform: translateY(-110%); opacity: 0; transition: transform 0.22s ease, opacity 0.22s ease; pointer-events: none; }
  .key-drawer.open { transform: translateY(0); opacity: 1; pointer-events: all; }
  .key-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .key-input { flex: 1; max-width: 480px; font-family: var(--font-mono); font-size: 13px; background: var(--bg-raised); border: 0.5px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text-primary); outline: none; transition: border-color 0.2s; }
  .key-input::placeholder { color: var(--text-muted); }
  .key-input:focus { border-color: var(--orange); }
  .connect-btn { font-family: var(--font-display); font-size: 13px; font-weight: 600; padding: 8px 16px; background: var(--orange); color: #0F0F0E; border: none; border-radius: 8px; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
  .connect-btn:hover { background: var(--orange-dark); }
  .remember-row { display: flex; align-items: center; gap: 16px; }
  .remember-left { display: flex; align-items: center; gap: 7px; cursor: pointer; }
  .remember-left input[type="checkbox"] { width: 13px; height: 13px; accent-color: var(--orange); cursor: pointer; }
  .remember-label { font-size: 12px; color: var(--text-secondary); cursor: pointer; user-select: none; }
  .saved-badge { display: none; align-items: center; gap: 5px; font-size: 11px; font-family: var(--font-mono); color: #60a5fa; background: rgba(96,165,250,0.08); border: 0.5px solid rgba(96,165,250,0.2); border-radius: 20px; padding: 3px 9px; }
  .saved-badge.visible { display: flex; }
  .saved-badge-dot { width: 5px; height: 5px; border-radius: 50%; background: #60a5fa; }
  .forget-btn { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); background: none; border: none; cursor: pointer; padding: 0; text-decoration: underline; text-underline-offset: 2px; transition: color 0.15s; }
  .forget-btn:hover { color: #f87171; }

  .main { position: fixed; top: var(--header-h); bottom: 0; left: 0; right: 0; display: flex; }

  .sidebar { width: var(--sidebar-w); flex-shrink: 0; border-right: 0.5px solid var(--border); display: flex; flex-direction: column; padding: 16px 10px; overflow-y: auto; background: var(--bg); }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .sidebar-label { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; padding: 0 6px; }
  .qa-btn { font-family: var(--font-display); font-size: 12px; font-weight: 400; padding: 8px 8px; background: transparent; border: 0.5px solid transparent; border-radius: 8px; cursor: pointer; text-align: left; color: var(--text-secondary); line-height: 1.35; width: 100%; margin-bottom: 3px; transition: border-color 0.15s, color 0.15s, background 0.15s; display: flex; align-items: flex-start; gap: 7px; }
  .qa-btn:hover { border-color: var(--border-hover); color: var(--text-primary); background: var(--bg-surface); }
  .qa-icon { font-size: 12px; flex-shrink: 0; margin-top: 1px; }
  .qa-text { flex: 1; }

  .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  .messages-wrap { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
  .messages-wrap::-webkit-scrollbar { width: 4px; }
  .messages-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { display: flex; gap: 10px; align-items: flex-start; animation: fadeUp 0.18s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { flex-direction: row-reverse; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; margin-top: 2px; }
  .msg.user .avatar { background: var(--orange); color: #0F0F0E; }
  .msg.assistant .avatar { background: var(--bg-raised); color: var(--text-secondary); border: 0.5px solid var(--border); font-size: 13px; }
  .bubble { max-width: 76%; padding: 10px 14px; border-radius: 14px; font-size: 13.5px; line-height: 1.65; }
  .msg.user .bubble { background: var(--orange); color: #0F0F0E; border-bottom-right-radius: 4px; font-weight: 500; }
  .msg.assistant .bubble { background: var(--bg-surface); border: 0.5px solid var(--border); color: var(--text-primary); border-bottom-left-radius: 4px; }
  .bubble strong { font-weight: 600; }
  .bubble code { font-family: var(--font-mono); font-size: 12px; background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 4px; }

  .typing-dots { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
  .typing-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); animation: pulse 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%, 80%, 100% { transform: translateY(0); opacity: 0.3; } 40% { transform: translateY(-4px); opacity: 1; } }

  .input-area { flex-shrink: 0; padding: 12px 24px 16px; border-top: 0.5px solid var(--border); background: var(--bg); }
  .error-bar { font-size: 12px; color: #f87171; background: rgba(248,113,113,0.08); border: 0.5px solid rgba(248,113,113,0.2); border-radius: 8px; padding: 7px 11px; margin-bottom: 8px; display: none; font-family: var(--font-mono); }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }
  .chat-input { flex: 1; font-family: var(--font-display); font-size: 14px; background: var(--bg-surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 10px 14px; color: var(--text-primary); outline: none; resize: none; min-height: 44px; max-height: 120px; line-height: 1.5; transition: border-color 0.2s; }
  .chat-input::placeholder { color: var(--text-muted); }
  .chat-input:focus { border-color: rgba(244,162,97,0.45); }
  .send-btn { width: 44px; height: 44px; background: var(--orange); border: none; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s, transform 0.1s; }
  .send-btn:hover { background: var(--orange-dark); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.35; cursor: default; }
  .send-btn svg { width: 16px; height: 16px; }
  .hint { font-size: 10px; color: var(--text-muted); text-align: center; margin-top: 8px; font-family: var(--font-mono); }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 20 20" fill="none">
        <path d="M10 2L17 6V14L10 18L3 14V6L10 2Z" fill="white" opacity="0.85"/>
        <path d="M10 6.5L13.5 8.5V12.5L10 14.5L6.5 12.5V8.5L10 6.5Z" fill="#F4A261"/>
      </svg>
    </div>
    <div class="logo-name">Hive <span>Command</span></div>
  </div>
  <div class="topbar-right">
    <div class="status-pill">
      <div class="dot" id="dot"></div>
      <span id="status-text">disconnected</span>
    </div>
    <button class="key-toggle" onclick="toggleDrawer()">
      <span>api key</span>
      <span class="key-toggle-arrow" id="drawer-arrow">▼</span>
    </button>
  </div>
</div>

<div class="key-drawer" id="key-drawer">
  <div class="key-row">
    <input class="key-input" type="password" id="api-key" placeholder="Paste your Hive API key..." />
    <button class="connect-btn" onclick="handleConnect()">Connect</button>
  </div>
  <div class="remember-row">
    <label class="remember-left">
      <input type="checkbox" id="remember-checkbox" />
      <span class="remember-label">Remember on this device</span>
    </label>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="saved-badge" id="saved-badge"><div class="saved-badge-dot"></div>key saved</div>
      <button class="forget-btn" id="forget-btn" style="display:none" onclick="forgetKey()">forget</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-label">Quick actions</div>
    <button class="qa-btn" onclick="sendQuick('Show me all open actions across all projects grouped by assignee')"><span class="qa-icon">📋</span><span class="qa-text">Open actions by assignee</span></button>
    <button class="qa-btn" onclick="sendQuick('List all active projects with their completion percentage and due dates')"><span class="qa-icon">📁</span><span class="qa-text">Active projects & progress</span></button>
    <button class="qa-btn" onclick="sendQuick('What actions are overdue across the entire workspace? Group by project and priority.')"><span class="qa-icon">⚠️</span><span class="qa-text">Overdue actions report</span></button>
    <button class="qa-btn" onclick="sendQuick('List all projects that have had no activity in the last 2 years — candidates for archiving')"><span class="qa-icon">🗂️</span><span class="qa-text">Archive candidates</span></button>
    <button class="qa-btn" onclick="sendQuick('Give me a workload summary — how many open actions does each team member have right now?')"><span class="qa-icon">👥</span><span class="qa-text">Team workload summary</span></button>
    <button class="qa-btn" onclick="sendQuick('Show me all actions completed this month across all projects with completion dates')"><span class="qa-icon">✅</span><span class="qa-text">Completed this month</span></button>
  </div>

  <div class="chat-panel">
    <div class="messages-wrap" id="messages">
      <div class="msg assistant">
        <div class="avatar">⬡</div>
        <div class="bubble">Click <strong>api key</strong> in the top right to connect your Hive workspace. Once connected, ask anything — analytics, task management, project status, bulk admin operations, and more.</div>
      </div>
    </div>
    <div class="input-area">
      <div class="error-bar" id="error-bar"></div>
      <div class="input-row">
        <textarea class="chat-input" id="chat-input" placeholder="Ask anything about your Hive workspace..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="handleSend()" disabled>
          <svg viewBox="0 0 17 17" fill="none"><path d="M15 8.5L2 2.5l2.8 6-2.8 6 13-6z" fill="white"/></svg>
        </button>
      </div>
      <div class="hint">shift+enter for new line &nbsp;·&nbsp; powered by Claude + Hive MCP</div>
    </div>
  </div>
</div>

<script>
  let apiKey = '', connected = false, history = [], drawerOpen = false;
  const HIVE_MCP = 'https://hive-mind.hive.com/mcp';
  const STORAGE_KEY = 'hive_command_api_key';
  const SYSTEM = `You are an expert Hive project management assistant with full administrative access to the user's Hive workspace via the Hive MCP server. You have complete access to perform ANY operation including reading, creating, and updating actions, projects, workspaces, managing assignments, running analytics, and admin operations. Be direct and structured. Use tables or lists for data. Never fabricate data.`;

  function toggleDrawer() {
    drawerOpen = !drawerOpen;
    document.getElementById('key-drawer').classList.toggle('open', drawerOpen);
    document.getElementById('drawer-arrow').classList.toggle('open', drawerOpen);
  }

  function setConnectedState(key, remembered) {
    apiKey = key; connected = true;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('dot').className = 'dot ' + (remembered ? 'remembered' : 'connected');
    document.getElementById('status-text').textContent = remembered ? 'connected · saved' : 'connected';
  }

  function showSavedBadge() { document.getElementById('saved-badge').classList.add('visible'); document.getElementById('forget-btn').style.display = 'block'; }
  function hideSavedBadge() { document.getElementById('saved-badge').classList.remove('visible'); document.getElementById('forget-btn').style.display = 'none'; }

  function handleConnect() {
    const val = document.getElementById('api-key').value.trim();
    if (!val) return;
    const remember = document.getElementById('remember-checkbox').checked;
    if (remember) { localStorage.setItem(STORAGE_KEY, val); showSavedBadge(); } else { localStorage.removeItem(STORAGE_KEY); hideSavedBadge(); }
    setConnectedState(val, remember);
    addMsg('assistant', 'Connected to your Hive workspace. What would you like to know or do?');
    toggleDrawer();
  }

  function forgetKey() {
    localStorage.removeItem(STORAGE_KEY);
    document.getElementById('api-key').value = '';
    document.getElementById('remember-checkbox').checked = false;
    hideSavedBadge(); apiKey = ''; connected = false;
    document.getElementById('dot').className = 'dot';
    document.getElementById('status-text').textContent = 'disconnected';
    document.getElementById('send-btn').disabled = true;
    addMsg('assistant', 'Saved key removed. Click api key above to reconnect.');
  }

  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      document.getElementById('api-key').value = saved;
      document.getElementById('remember-checkbox').checked = true;
      showSavedBadge(); setConnectedState(saved, true);
      addMsg('assistant', 'Welcome back — reconnected using your saved key. What would you like to do?');
    } else { toggleDrawer(); }
  });

  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
  function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }

  function sendQuick(text) {
    if (!connected) { if (!drawerOpen) toggleDrawer(); showError('Connect your Hive API key first.'); return; }
    document.getElementById('chat-input').value = text; handleSend();
  }

  async function handleSend() {
    if (!connected) { if (!drawerOpen) toggleDrawer(); showError('Connect your Hive API key first.'); return; }
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;
    hideError(); input.value = ''; input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;
    addMsg('user', text);
    history.push({ role: 'user', content: text });
    const typingId = addTyping();
    try {
      const res = await fetch('/api/chat', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: SYSTEM, messages: history, mcp_servers: [{ type: 'url', url: `${HIVE_MCP}?api_key=${apiKey}`, name: 'hive' }] })
      });
      removeTyping(typingId);
      if (!res.ok) { const err = await res.json(); throw new Error(err.error?.message || `API error ${res.status}`); }
      const data = await res.json();
      const reply = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n') || data.content.filter(b => b.type === 'mcp_tool_result').map(b => b.content?.[0]?.text || '').join('\n') || 'Done.';
      addMsg('assistant', reply);
      history.push({ role: 'assistant', content: reply });
    } catch (err) {
      removeTyping(typingId);
      document.getElementById('dot').className = 'dot error';
      document.getElementById('status-text').textContent = 'error';
      showError(err.message || 'Request failed. Check your API key and try again.');
    }
    document.getElementById('send-btn').disabled = false;
  }

  function addMsg(role, text) {
    const wrap = document.getElementById('messages');
    const div = document.createElement('div'); div.className = 'msg ' + role;
    const av = document.createElement('div'); av.className = 'avatar'; av.textContent = role === 'user' ? 'You' : '⬡';
    const bub = document.createElement('div'); bub.className = 'bubble';
    bub.innerHTML = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\n/g,'<br>');
    div.appendChild(av); div.appendChild(bub); wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function addTyping() {
    const wrap = document.getElementById('messages');
    const div = document.createElement('div'); div.className = 'msg assistant';
    const id = 'typing-' + Date.now(); div.id = id;
    const av = document.createElement('div'); av.className = 'avatar'; av.textContent = '⬡';
    const bub = document.createElement('div'); bub.className = 'bubble';
    bub.innerHTML = '<div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
    div.appendChild(av); div.appendChild(bub); wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight; return id;
  }

  function removeTyping(id) { const el = document.getElementById(id); if (el) el.remove(); }
  function showError(msg) { const bar = document.getElementById('error-bar'); bar.textContent = msg; bar.style.display = 'block'; }
  function hideError() { document.getElementById('error-bar').style.display = 'none'; }
</script>
</body>
</html>
